name: Playwright CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Typecheck and Playwright tests
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://orderlab-playwright-target.lovable.app
      API_BASE_URL: https://orderlab-playwright-target.lovable.app/api/public
      CUSTOMER_EMAIL: customer@example.com
      CUSTOMER_PASSWORD: CustomerDemo123!
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: AdminDemo123!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
